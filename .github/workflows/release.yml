name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,packaging]"
          pip install Pillow

      - name: Bootstrap assets
        run: python scripts/bootstrap_assets.py

      - name: Create icon
        run: python scripts/create_icon.py

      - name: Build PyInstaller bundle
        run: >
          pyinstaller packaging/win/uzpr.spec
          --distpath dist
          --workpath build/pyinstaller
          --noconfirm

      - name: Build Inno Setup installer
        run: |
          choco install innosetup -y --no-progress
          iscc packaging/win/uzpr.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: packaging/win/output/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/win/output/*.exe
          generate_release_notes: true
