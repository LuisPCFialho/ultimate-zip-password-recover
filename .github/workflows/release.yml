name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,packaging]"
          pip install Pillow

      - name: Bootstrap assets
        run: python scripts/bootstrap_assets.py

      - name: Create icon
        run: python scripts/create_icon.py

      - name: Build PyInstaller bundle
        run: >
          pyinstaller packaging/win/uzpr.spec
          --distpath dist
          --workpath build/pyinstaller
          --noconfirm

      - name: Build Inno Setup installer
        run: |
          choco install innosetup -y --no-progress
          iscc packaging/win/uzpr.iss

      - name: Compute sha256
        shell: pwsh
        run: |
          $exe = Get-ChildItem packaging/win/output/*.exe | Select-Object -First 1
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash
          "$hash  $($exe.Name)" | Out-File -Encoding ascii "$($exe.FullName).sha256"
          Write-Host "sha256: $hash"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: |
            packaging/win/output/*.exe
            packaging/win/output/*.sha256

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          $body = ""
          if (Test-Path CHANGELOG.md) {
            $lines = Get-Content CHANGELOG.md
            $start = -1
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match "^##\s.*$ver") { $start = $i + 1; break }
            }
            if ($start -ge 0) {
              $end = $lines.Count
              for ($i = $start; $i -lt $lines.Count; $i++) {
                if ($lines[$i] -match "^##\s") { $end = $i; break }
              }
              $body = ($lines[$start..($end-1)] -join "`n").Trim()
            }
          }
          $path = "release_notes.md"
          if ([string]::IsNullOrWhiteSpace($body)) {
            "Release $tag" | Out-File -Encoding utf8 $path
          } else {
            $body | Out-File -Encoding utf8 $path
          }
          "path=$path" | Out-File -Encoding utf8 -Append $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packaging/win/output/*.exe
            packaging/win/output/*.sha256
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: true
